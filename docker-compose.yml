services:
  api:
    build:
      dockerfile: ./Dockerfile
      context: ./apps/api
    volumes:
      - ./apps/api/pb_data:/app/pb_data

  web:
    build:
      dockerfile: ./apps/web/Dockerfile
      context: .
      args:
        APP_NAME: ${APP_NAME:-App Name}
        APP_LANGUAGE: ${APP_LANGUAGE:-en}
        APP_PORT: ${APP_PORT:-3000}
    environment:
      API_URL: ${API_URL:-http://api:8080}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
