description:
  it:
    genericName: Material Distributor Platform
    localisedName: Materialverteiler
    shortDescription: >-
      Material distribution platform, allowing institutions to pass on items and
      materials to give them a second life, instead of discarding them.
    longDescription: >
      Materialverteiler (material distributor) offers a ready-to-go solution to
      start a material distribution platform, simplifying the process of sharing
      resources within communities. The platform connects institutions - such as
      schools, theaters, or non-profits - allowing them to pass on items and
      materials, giving them a second life instead of discarding them. With an
      intuitive interface, it promotes sustainability by reducing waste,
      fostering collaboration, and making it easy for organizations to donate,
      exchange, or repurpose surplus materials efficiently.
    features:
      - "Material listings: Create, browse, and view materials"
      - "Transaction emails: Automatic emails for new listings and interactions"
      - "User Management: Sign up, login, email verification and password reset"
      - >-
        Sign up approval: Grant access to users/institutions only after admin
        approval
      - >-
        Admin email workflow: Automated email notifications for new sign ups and
        listing activities
      - "Keystone integration: CMS for content management"
